name: Groq PR Review Bot

on:
  workflow_call:
    secrets:
      GROQ_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR Diff
        run: |
          git fetch origin main
          # Truncate the diff to 3000 characters to prevent API size errors
          git diff origin/main...HEAD | head -c 3000 > diff.txt

      - name: AI Review via Groq
        id: review
        run: |
          # Read and escape the diff for JSON
          DIFF_CONTENT=$(cat diff.txt | jq -Rs .)
          
          # Call Groq API
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.GROQ_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"llama3-70b-8192\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are a code reviewer. Find bugs and suggest improvements.\"},
                {\"role\": \"user\", \"content\": $DIFF_CONTENT}
              ]
            }")

          # DEBUG: Print the raw response so we can see any errors
          echo "Full API Response: $RESPONSE"
          
          # Extract content or error
          REVIEW=$(echo $RESPONSE | jq -r '.choices[0].message.content' 2>/dev/null || echo "null")
          
          if [ "$REVIEW" == "null" ]; then
            ERROR_MSG=$(echo $RESPONSE | jq -r '.error.message' 2>/dev/null || echo "Unknown API Error")
            echo "comment=⚠️ **Groq API Error:** $ERROR_MSG" >> $GITHUB_OUTPUT
          else
            echo "comment=$REVIEW" >> $GITHUB_OUTPUT
          fi

      - name: Post Comment
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### 🤖 Groq AI Review
            ${{ steps.review.outputs.comment }}
