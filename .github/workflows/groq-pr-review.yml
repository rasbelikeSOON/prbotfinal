name: Groq PR Review Bot

on:
  workflow_call:
    secrets:
      GROQ_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Fetch PR Diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.txt

      - name: AI Review via Groq
        id: review
        run: |
          # Send the diff to Groq and get a review
          DIFF=$(cat diff.txt | head -c 4000 | jq -Rs .)
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.GROQ_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"llama3-8b-8192\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are a code reviewer. Find bugs and suggest improvements for this diff.\"},
                {\"role\": \"user\", \"content\": $DIFF}
              ]
            }")
          REVIEW=$(echo $RESPONSE | jq -r '.choices[0].message.content' || echo "AI skipped review due to an error.")
          echo "comment=$REVIEW" >> $GITHUB_OUTPUT

      - name: Post Comment
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### 🤖 Groq AI Review
            ${{ steps.review.outputs.comment }}
